services:
  - type: web
    name: project-management-system
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn --chdir backend "app:create_app()"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: project-management-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: UPLOAD_FOLDER
        value: uploads

databases:
  - name: project-management-db
    plan: free
